
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart TV OTT Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* TV UI Specific Resets and Styles */
        body {
            margin: 0;
            padding: 0;
            background-color: #141414;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevent native scrolling, handle it via transforms */
            user-select: none; /* Prevent text selection on TV */
        }

        /* Hide scrollbars completely for TV apps */
        ::-webkit-scrollbar {
            display: none;
        }

        /* Hero Image Gradient Fades */
        .hero-gradient-bottom {
            background: linear-gradient(to top, #141414 0%, rgba(20,20,20,0.4) 50%, transparent 100%);
        }
        .hero-gradient-right {
            background: linear-gradient(to right, #141414 0%, rgba(20,20,20,0.8) 40%, transparent 100%);
        }

        /* Smooth UI Transitions */
        .row-container {
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
        }
        .row-track {
            transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
        }
        .item-card {
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0.6;
        }
        
        /* The Focused State (What the user is currently selecting) */
        .item-card.focused {
            transform: scale(1.15);
            opacity: 1;
            z-index: 50;
            border: 4px solid white;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.8), 0 10px 10px -5px rgba(0, 0, 0, 0.5);
            border-radius: 0.5rem;
        }

        /* Spinner for video player */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #E50914;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- HERO SECTION -->
    <div id="hero" class="relative w-full h-[65vh] transition-all duration-500 ease-in-out">
        <div class="absolute inset-0">
            <img id="hero-img" src="" alt="Hero" class="w-full h-full object-cover opacity-70 transition-opacity duration-500">
            <div class="absolute inset-0 hero-gradient-right w-[70%]"></div>
            <div class="absolute inset-0 hero-gradient-bottom"></div>
        </div>

        <div class="absolute bottom-[15%] left-[4%] w-[50%] z-10">
            <h1 id="hero-title" class="text-5xl md:text-7xl font-bold mb-4 drop-shadow-lg tracking-tight">Title</h1>
            
            <div class="flex items-center space-x-4 text-sm md:text-base font-semibold mb-4 text-gray-300">
                <span id="hero-match" class="text-green-500">98% Match</span>
                <span id="hero-year">2024</span>
                <span id="hero-rating" class="border border-gray-500 px-1 rounded text-xs">TV-MA</span>
                <span id="hero-duration">2h 15m</span>
            </div>

            <p id="hero-desc" class="text-lg md:text-xl text-gray-200 drop-shadow-md line-clamp-3 max-w-2xl mb-8">
                Description goes here.
            </p>

            <div class="flex space-x-4">
                <div class="flex items-center bg-white text-black px-6 py-2 rounded text-lg font-bold">
                    <svg class="w-6 h-6 mr-2 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Play
                </div>
            </div>
        </div>
    </div>

    <!-- ROWS SECTION -->
    <div id="app-content" class="relative z-20 pb-20 row-container pl-[4%]">
        <!-- Rows will be injected here by JavaScript -->
    </div>

    <!-- FULLSCREEN PLAYER OVERLAY -->
    <div id="player" class="fixed inset-0 bg-black z-[100] hidden flex-col items-center justify-center">
        <div class="absolute top-8 left-8 bg-white/20 px-4 py-2 rounded text-white font-bold backdrop-blur">
            Press BACK or ESC to exit
        </div>
        <div class="loader mb-6"></div>
        <h2 id="player-title" class="text-3xl font-light text-white mb-2">Loading Stream...</h2>
    </div>

    <!-- REMOTE HINT -->
    <div class="fixed bottom-6 right-6 flex items-center space-x-2 text-gray-400 z-50 bg-black/80 px-4 py-2 rounded-full border border-gray-800">
        <span class="text-sm">Use Arrow Keys to navigate, Enter to play</span>
    </div>

    <script>
        // --- 1. MOCK DATA GENERATION ---
        const images = [
            'https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1616530940355-351fabd9524b?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&w=800&q=80'
        ];

        const generateItems = (category, count, startId) => {
            let items = [];
            for (let i = 0; i < count; i++) {
                items.push({
                    id: startId + i,
                    title: `${category} Movie ${i + 1}`,
                    description: `This is an amazing ${category} movie. Enjoy the immersive experience right on your Smart TV screen using your D-Pad remote.`,
                    imageUrl: images[(startId + i) % images.length],
                    match: Math.floor(Math.random() * 20) + 80,
                    year: 2020 + Math.floor(Math.random() * 5),
                    rating: ['TV-MA', 'TV-14', 'PG-13'][Math.floor(Math.random() * 3)],
                    duration: `${Math.floor(Math.random() * 2) + 1}h ${Math.floor(Math.random() * 59)}m`
                });
            }
            return items;
        };

        const CATEGORIES = [
            { title: 'Trending Now', items: generateItems('Trending', 12, 100) },
            { title: 'Action & Adventure', items: generateItems('Action', 15, 200) },
            { title: 'Sci-Fi Hits', items: generateItems('Sci-Fi', 10, 300) },
            { title: 'Comedy Specials', items: generateItems('Comedy', 14, 400) },
            { title: 'Award Winners', items: generateItems('Drama', 8, 500) }
        ];

        // --- 2. STATE MANAGEMENT ---
        let currentRow = 0;
        let currentCol = 0;
        let isPlaying = false;

        // Constants for UI calculations
        const ITEM_WIDTH = 280; // Match w-[280px]
        const ITEM_MARGIN = 16; // Match space-x-4
        const ROW_HEIGHT = 200; // Approximate height of a row + margins

        // --- 3. DOM ELEMENTS ---
        const appContent = document.getElementById('app-content');
        const heroImg = document.getElementById('hero-img');
        const heroTitle = document.getElementById('hero-title');
        const heroDesc = document.getElementById('hero-desc');
        const heroMatch = document.getElementById('hero-match');
        const heroYear = document.getElementById('hero-year');
        const heroRating = document.getElementById('hero-rating');
        const heroDuration = document.getElementById('hero-duration');
        const player = document.getElementById('player');
        const playerTitle = document.getElementById('player-title');

        // --- 4. RENDER UI ---
        function renderApp() {
            let html = '';
            CATEGORIES.forEach((category, rIndex) => {
                html += `
                    <div class="mb-10" id="row-wrapper-${rIndex}">
                        <h2 id="row-title-${rIndex}" class="text-xl md:text-2xl font-bold mb-3 text-gray-400 transition-colors duration-300">${category.title}</h2>
                        <div class="relative w-full overflow-visible">
                            <div id="row-track-${rIndex}" class="flex space-x-4 pt-4 pb-8 row-track w-max">
                `;
                
                category.items.forEach((item, cIndex) => {
                    html += `
                        <div id="item-${rIndex}-${cIndex}" class="item-card relative flex-none w-[280px] aspect-video bg-gray-800 rounded-md">
                            <img src="${item.imageUrl}" class="w-full h-full object-cover rounded-md" alt="${item.title}">
                        </div>
                    `;
                });

                html += `</div></div></div>`;
            });
            appContent.innerHTML = html;
            updateFocus();
        }

        // --- 5. UPDATE FOCUS & UI ---
        function updateFocus() {
            // Remove previous focus
            document.querySelectorAll('.focused').forEach(el => el.classList.remove('focused'));
            
            // Manage Row Title Colors
            document.querySelectorAll('h2').forEach(el => {
                el.classList.remove('text-white');
                el.classList.add('text-gray-400');
            });

            // Set new focus
            const targetItem = document.getElementById(`item-${currentRow}-${currentCol}`);
            const targetTitle = document.getElementById(`row-title-${currentRow}`);
            
            if (targetItem) targetItem.classList.add('focused');
            if (targetTitle) {
                targetTitle.classList.remove('text-gray-400');
                targetTitle.classList.add('text-white');
            }

            // Update Hero Banner
            const activeData = CATEGORIES[currentRow].items[currentCol];
            heroImg.style.opacity = '0'; // Fade out
            
            setTimeout(() => {
                heroImg.src = activeData.imageUrl;
                heroTitle.textContent = activeData.title;
                heroDesc.textContent = activeData.description;
                heroMatch.textContent = `${activeData.match}% Match`;
                heroYear.textContent = activeData.year;
                heroRating.textContent = activeData.rating;
                heroDuration.textContent = activeData.duration;
                heroImg.style.opacity = '0.7'; // Fade in
            }, 150);

            // Calculate Spatial Scrolling
            
            // 1. Horizontal Scroll (Move the track)
            const track = document.getElementById(`row-track-${currentRow}`);
            // Move item to the left edge if it's past the first item
            const xOffset = currentCol > 0 ? (currentCol * (ITEM_WIDTH + ITEM_MARGIN)) - 40 : 0;
            track.style.transform = `translateX(-${xOffset}px)`;

            // 2. Vertical Scroll (Move the whole content area up)
            // If we go past the first row, shift everything up so the focused row stays in the center
            const yOffset = currentRow > 0 ? (currentRow * ROW_HEIGHT) - 50 : 0;
            appContent.style.transform = `translateY(-${yOffset}px)`;
        }

        // --- 6. HANDLE REMOTE CONTROL (KEYBOARD) EVENTS ---
        window.addEventListener('keydown', (e) => {
            const key = e.key;
            const keyCode = e.keyCode;

            // Samsung Tizen specific 'Return/Back' key code is 10009
            const isBackKey = key === 'Escape' || key === 'Backspace' || keyCode === 10009;

            if (isPlaying) {
                if (isBackKey) {
                    isPlaying = false;
                    player.classList.add('hidden');
                    player.classList.remove('flex');
                    e.preventDefault();
                }
                return; // Disable other navigation while playing
            }

            // Prevent default browser scrolling for arrow keys
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                e.preventDefault();
            }

            let changed = false;

            switch (key) {
                case 'ArrowUp':
                    if (currentRow > 0) {
                        currentRow--;
                        changed = true;
                    }
                    break;
                case 'ArrowDown':
                    if (currentRow < CATEGORIES.length - 1) {
                        currentRow++;
                        changed = true;
                    }
                    break;
                case 'ArrowLeft':
                    if (currentCol > 0) {
                        currentCol--;
                        changed = true;
                    }
                    break;
                case 'ArrowRight':
                    if (currentCol < CATEGORIES[currentRow].items.length - 1) {
                        currentCol++;
                        changed = true;
                    }
                    break;
                case 'Enter':
                    // Play Video
                    isPlaying = true;
                    playerTitle.textContent = `Loading Stream: ${CATEGORIES[currentRow].items[currentCol].title}`;
                    player.classList.remove('hidden');
                    player.classList.add('flex');
                    break;
            }

            if (changed) {
                // Ensure column doesn't exceed row length if we jumped to a shorter row
                const maxCol = CATEGORIES[currentRow].items.length - 1;
                if (currentCol > maxCol) currentCol = maxCol;
                
                updateFocus();
            }
        });

        // Initialize App
        renderApp();
    </script>
</body>
</html>
