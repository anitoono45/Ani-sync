
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Native TV Interface</title>
    <style>
        /* CRITICAL: Hides the mouse cursor completely for TV mode */
        * { cursor: none !important; }

        body {
            margin: 0;
            padding: 0;
            background-color: #141414;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
            user-select: none;
        }

        #hero {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 70vh;
            z-index: 1;
            background: #000;
        }

        #hero-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        #hero-content {
            position: absolute;
            bottom: 10vh;
            left: 5vw;
            z-index: 2;
            width: 40vw;
        }

        h1 { font-size: 3vw; margin-bottom: 10px; }

        #gallery {
            position: absolute;
            top: 60vh;
            left: 0;
            width: 100vw;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .row-track {
            display: flex;
            padding: 2vh 5vw;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .item {
            width: 18vw;
            height: 10vw;
            background: #333;
            margin-right: 1.5vw;
            flex-shrink: 0;
            border: 0.4vw solid transparent;
            transition: transform 0.3s, border-color 0.3s;
        }

        /* Remote Control Focused State */
        .item.focused {
            transform: scale(1.15);
            border-color: #fff;
            z-index: 10;
        }

        /* Visual Click Feedback */
        .item.active-click {
            transform: scale(0.95);
            border-color: #e50914;
        }

        #player {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 1000;
            justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <div id="hero">
        <img id="hero-img" src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=1280&q=80">
        <div id="hero-content">
            <h1 id="hero-title">Select a Movie</h1>
            <p id="hero-desc">Use your Remote D-Pad to navigate.</p>
        </div>
    </div>

    <div id="gallery"></div>

    <div id="player"><h1>Playing Video... Press Back to Exit</h1></div>

    <script>
        const data = Array.from({length: 4}, (_, r) => ({
            items: Array.from({length: 10}, (_, c) => ({ title: `Item ${r}-${c}` }))
        }));

        let r = 0, c = 0;
        const gallery = document.getElementById('gallery');

        // Build HTML
        data.forEach((row, rowIndex) => {
            let rowDiv = document.createElement('div');
            rowDiv.className = 'row-track';
            row.items.forEach((item, colIndex) => {
                let div = document.createElement('div');
                div.className = 'item';
                div.id = `i-${rowIndex}-${colIndex}`;
                rowDiv.appendChild(div);
            });
            gallery.appendChild(rowDiv);
        });

        function updateFocus() {
            document.querySelectorAll('.focused').forEach(el => el.classList.remove('focused'));
            const el = document.getElementById(`i-${r}-${c}`);
            el.classList.add('focused');
            
            // Move gallery
            gallery.style.transform = `translateY(-${r * 15}vw)`;
            // Align track
            const track = gallery.children[r];
            track.style.transform = `translateX(-${c * 19.5}vw)`;
            
            document.getElementById('hero-title').innerText = `Movie Selection: ${r}-${c}`;
        }

        window.addEventListener('keydown', (e) => {
            const key = e.keyCode;
            // Remote Keycodes: 37=L, 38=U, 39=R, 40=D, 13=Enter
            if (key === 37 && c > 0) c--;
            else if (key === 39 && c < data[r].items.length - 1) c++;
            else if (key === 38 && r > 0) r--;
            else if (key === 40 && r < data.length - 1) r++;
            else if (key === 13) { // Enter/Select
                const el = document.getElementById(`i-${r}-${c}`);
                el.classList.add('active-click');
                setTimeout(() => {
                    el.classList.remove('active-click');
                    document.getElementById('player').style.display = 'flex';
                }, 200);
            }
            // Back buttons (Tizen/WebOS)
            else if (key === 10009 || key === 461 || key === 8) {
                document.getElementById('player').style.display = 'none';
            }
            updateFocus();
        });

        updateFocus();
    </script>
</body>
</html>
